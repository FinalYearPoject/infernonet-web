services:
  postgres:
    image: postgres:15-alpine
    container_name: infernonet_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-infernonet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infernonet_secret}
      POSTGRES_DB: ${POSTGRES_DB:-infernonet}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infernonet} -d ${POSTGRES_DB:-infernonet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: infernonet_backend
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-infernonet}
      DB_USER: ${POSTGRES_USER:-infernonet}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-infernonet_secret}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
