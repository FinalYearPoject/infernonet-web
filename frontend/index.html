<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfernoNet</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

  <header class="app-header" id="app-header" style="display:none">
    <div class="header-brand">
      <span class="brand-icon">🔥</span>
      <span class="brand-name">InfernoNet</span>
    </div>
    <nav class="header-nav">
      <a href="#/incidents"     class="nav-link" data-route="incidents">Incidents</a>
      <a href="#/users"         class="nav-link" data-route="users" data-staff-only>Users</a>
      <a href="#/organizations" class="nav-link" data-route="organizations" data-staff-only>Organizations</a>
      <a href="#/equipment"     class="nav-link" data-route="equipment" data-staff-only>Equipment</a>
      <a href="#/map"           class="nav-link" data-route="map">Live Map</a>
    </nav>
    <div class="header-user">
      <span class="user-badge" id="nav-user-info"></span>
      <button class="btn btn-ghost btn-sm" id="btn-logout">Logout</button>
    </div>
  </header>

  <main id="app" class="app-main"></main>

  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/pages/login.js"></script>
  <script src="/js/pages/incidents.js"></script>
  <script src="/js/pages/incident.js"></script>
  <script src="/js/pages/users.js"></script>
  <script src="/js/pages/channels.js"></script>
  <script src="/js/pages/equipment.js"></script>
  <script src="/js/pages/map.js"></script>
  <script src="/js/pages/organizations.js"></script>
  <script src="/js/router.js"></script>
</body>
</html>
